<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Days Calendar Project</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>

  <body>
    <main class="container">
      <h1>Day & Month Calendar</h1>
      <!-- ============ Previous and next icons -->
      <div style="width: 100%">
        <div class="head">
          <button
            id="previous-btn"
            class="pre-next-btn"
            aria-label="Previous month"
          >
            <i class="fa-solid fa-arrow-left"></i>
          </button>

          <div class="middle-controls">
            <button id="today-btn" class="today-btn">Today</button>

            <div class="select-group">
              <label for="monthsSelection">Month:</label>
              <select id="monthsSelection"></select>

              <label for="yearsSelection">Year:</label>
              <select id="yearsSelection"></select>
            </div>
          </div>

          <button id="next-btn" class="pre-next-btn" aria-label="Next month">
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>
      <!-- ============ Today's Details -->
      <div class="today-box">
        <p>Today</p>
        <span id="todays-day-date"></span>
      </div>
      <!-- ============ Days of the week -->
      <div class="days-of-week-box">
        <ul class="days-of-week">
          <li>Sun</li>
          <li>Mon</li>
          <li>Tue</li>
          <li>Wed</li>
          <li>Thu</li>
          <li>Fri</li>
          <li>Sat</li>
        </ul>
      </div>
      <!-- ============ Dates of the month -->
      <div class="dates-of-month">
        <ul class="days-of-month" id="dates-of-month"></ul>
      </div>
    </main>
    <div id="special-tooltip" class="tooltip"></div>
    <!-- ============ Connecting js file -->
    <script type="module" src="script.js"></script>
  </body>
</html>
